<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TriPatient — Classement des mails</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f4f8; color: #1a202c; min-height: 100vh; }

    /* ── Header ── */
    header { background: linear-gradient(135deg,#1a365d 0%,#2b6cb0 100%); color:white; padding:15px 24px; display:flex; align-items:center; gap:14px; box-shadow:0 2px 8px rgba(0,0,0,.2); flex-wrap:wrap; }
    header .logo { font-size:1.8rem; }
    header h1  { font-size:1.25rem; font-weight:700; }
    header p   { font-size:0.8rem; opacity:.8; margin-top:1px; }
    .header-right { margin-left:auto; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
    .clock { font-size:0.76rem; opacity:.85; text-align:right; }

    .btn-gmail { display:inline-flex; align-items:center; gap:7px; background:white; color:#1a365d; border:none; border-radius:8px; padding:7px 14px; font-size:0.81rem; font-weight:700; cursor:pointer; box-shadow:0 1px 4px rgba(0,0,0,.15); transition:.15s; }
    .btn-gmail:hover { background:#ebf8ff; }
    .btn-gmail.connected { background:#c6f6d5; color:#276749; }
    .gmail-dot { width:8px; height:8px; border-radius:50%; background:#fc8181; display:inline-block; }
    .gmail-dot.on { background:#68d391; }
    .btn-refresh-hdr { background:rgba(255,255,255,.15); color:white; border:1px solid rgba(255,255,255,.3); border-radius:8px; padding:6px 12px; font-size:0.78rem; font-weight:600; cursor:pointer; transition:.15s; }
    .btn-refresh-hdr:hover { background:rgba(255,255,255,.28); }
    .btn-refresh-hdr.ia-on { background:#c6f6d5; color:#276749; border-color:#9ae6b4; }

    /* ── Stats bar ── */
    .stats-bar { background:white; padding:10px 24px; display:flex; gap:12px; align-items:center; border-bottom:1px solid #e2e8f0; flex-wrap:wrap; }
    .stat-chip { display:flex; align-items:center; gap:5px; padding:3px 11px; border-radius:14px; font-size:0.81rem; font-weight:600; }
    .stat-chip.urgent    { background:#fff5f5; color:#c53030; border:1px solid #fed7d7; }
    .stat-chip.moyen     { background:#fffaf0; color:#c05621; border:1px solid #feebc8; }
    .stat-chip.pasurgent { background:#f0fff4; color:#276749; border:1px solid #c6f6d5; }
    .stat-chip.inconnu   { background:#f7fafc; color:#718096; border:1px solid #e2e8f0; }
    .stat-chip.autre     { background:#edf2f7; color:#4a5568; border:1px solid #cbd5e0; }
    .stat-label { font-size:0.76rem; color:#718096; margin-left:auto; }
    .icon-btn { background:none; border:1px solid #e2e8f0; border-radius:7px; padding:3px 10px; font-size:0.74rem; color:#718096; cursor:pointer; }
    .icon-btn:hover { background:#f7fafc; }

    /* ── Sync bar ── */
    .sync-bar { background:#ebf8ff; border-bottom:1px solid #bee3f8; padding:8px 24px; font-size:0.79rem; color:#2b6cb0; display:none; align-items:center; gap:10px; }
    .sync-bar.visible { display:flex; }
    .spinner { width:13px; height:13px; border:2px solid #bee3f8; border-top-color:#2b6cb0; border-radius:50%; animation:spin .7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .btn-sm { background:#2b6cb0; color:white; border:none; border-radius:6px; padding:3px 11px; font-size:0.76rem; font-weight:600; cursor:pointer; margin-left:auto; }
    .btn-sm:hover { background:#2c5282; }

    /* ── Setup banner ── */
    .setup-banner { background:white; border:2px dashed #bee3f8; border-radius:12px; margin:28px auto; max-width:640px; padding:32px 36px; text-align:center; }
    .setup-banner h2 { font-size:1.05rem; color:#1a365d; margin-bottom:8px; }
    .setup-banner p  { font-size:0.84rem; color:#718096; margin-bottom:20px; line-height:1.65; }
    .setup-steps { text-align:left; margin:0 auto 22px; max-width:520px; }
    .setup-steps li { font-size:0.82rem; color:#4a5568; padding:7px 0; border-bottom:1px solid #f0f4f8; display:flex; gap:10px; align-items:flex-start; }
    .setup-steps li:last-child { border-bottom:none; }
    .step-num { background:#2b6cb0; color:white; border-radius:50%; width:20px; height:20px; font-size:0.68rem; font-weight:800; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:1px; }
    .setup-steps a { color:#2b6cb0; font-weight:600; }
    .setup-steps code { background:#f0f4f8; padding:1px 6px; border-radius:4px; font-size:0.8rem; }
    .field-row { display:flex; gap:8px; max-width:520px; margin:0 auto 10px; }
    .field-row input { flex:1; padding:8px 11px; border:1px solid #e2e8f0; border-radius:8px; font-size:0.83rem; font-family:inherit; }
    .field-row input:focus { outline:none; border-color:#2b6cb0; }
    .btn-primary { background:#2b6cb0; color:white; border:none; border-radius:8px; padding:9px 18px; font-size:0.83rem; font-weight:700; cursor:pointer; white-space:nowrap; }
    .btn-primary:hover { background:#2c5282; }

    /* ── Main ── */
    main { max-width:940px; margin:20px auto; padding:0 16px 70px; }
    .legend-panel { display:none; background:white; border:1px solid #e2e8f0; border-radius:10px; margin-bottom:14px; padding:13px 18px; font-size:0.79rem; }
    .legend-panel.open { display:block; }
    .legend-panel table { width:100%; border-collapse:collapse; }
    .legend-panel td { padding:5px 10px; border-bottom:1px solid #f0f4f8; vertical-align:top; }
    .legend-panel td:first-child { font-weight:600; color:#553c9a; width:55%; }
    .legend-panel tr:last-child td { border-bottom:none; }

    .section-title { font-size:0.66rem; font-weight:800; text-transform:uppercase; letter-spacing:.12em; color:#a0aec0; margin:20px 0 8px; display:flex; align-items:center; gap:8px; }
    .section-title::after { content:""; flex:1; height:1px; background:#e2e8f0; }

    /* ── Cards ── */
    .mail-card { background:white; border-radius:10px; box-shadow:0 1px 4px rgba(0,0,0,.07); margin-bottom:9px; border-left:5px solid; overflow:hidden; transition:box-shadow .15s; }
    .mail-card:hover { box-shadow:0 4px 14px rgba(0,0,0,.11); }
    .mail-card.urgent    { border-color:#fc8181; }
    .mail-card.moyen     { border-color:#f6ad55; }
    .mail-card.pasurgent { border-color:#68d391; }
    .mail-card.inconnu   { border-color:#cbd5e0; }
    .mail-card.autre     { border-color:#a0aec0; }
    .mail-card.traite    { opacity:.55; }

    .card-header { padding:12px 15px 10px; display:flex; align-items:flex-start; gap:11px; cursor:pointer; user-select:none; }
    .rank { font-size:0.69rem; font-weight:800; color:#cbd5e0; min-width:22px; padding-top:3px; }
    .niveau-badge { display:inline-flex; align-items:center; gap:4px; padding:2px 9px; border-radius:11px; font-size:0.68rem; font-weight:800; white-space:nowrap; letter-spacing:.04em; }
    .niveau-badge.urgent    { background:#fff5f5; color:#c53030; }
    .niveau-badge.moyen     { background:#fffaf0; color:#c05621; }
    .niveau-badge.pasurgent { background:#f0fff4; color:#276749; }
    .niveau-badge.inconnu   { background:#f7fafc; color:#718096; }
    .niveau-badge.autre     { background:#edf2f7; color:#4a5568; }

    .card-main { flex:1; min-width:0; }
    .card-top  { display:flex; align-items:center; gap:7px; flex-wrap:wrap; margin-bottom:3px; }
    .patient-name { font-weight:700; font-size:0.9rem; }
    .patient-id   { font-size:0.7rem; color:#a0aec0; }
    .mail-time    { font-size:0.7rem; color:#718096; margin-left:auto; white-space:nowrap; }
    .mail-sujet   { font-size:0.84rem; color:#4a5568; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .pattern-match { display:inline-flex; align-items:center; gap:4px; margin-top:4px; font-size:0.69rem; font-weight:600; color:#805ad5; background:#faf5ff; border:1px solid #e9d8fd; border-radius:6px; padding:1px 7px; }
    .src-badge { font-size:0.67rem; color:#a0aec0; background:#f7fafc; border:1px solid #e2e8f0; border-radius:5px; padding:1px 6px; }
    .expand-icon { color:#cbd5e0; font-size:0.72rem; padding-top:4px; transition:transform .2s; flex-shrink:0; }
    .mail-card.open .expand-icon { transform:rotate(180deg); }

    .card-detail { display:none; padding:0 15px 15px 49px; }
    .mail-card.open .card-detail { display:block; }
    .detail-sep { height:1px; background:#f0f4f8; margin-bottom:12px; }
    .detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:9px; margin-bottom:9px; }
    @media(max-width:540px){ .detail-grid{grid-template-columns:1fr;} }
    .detail-box { background:#f7fafc; border-radius:8px; padding:9px 12px; }
    .detail-box h4 { font-size:0.64rem; font-weight:800; text-transform:uppercase; letter-spacing:.09em; color:#a0aec0; margin-bottom:6px; }
    .detail-box p  { font-size:0.8rem; color:#4a5568; margin-bottom:3px; }
    .tag { display:inline-block; background:#ebf8ff; color:#2b6cb0; border-radius:5px; padding:1px 7px; font-size:0.69rem; font-weight:600; margin:2px 2px 0 0; }
    .rule-hit { font-size:0.69rem; font-weight:700; }
    .rule-hit.urgent    { color:#c53030; }
    .rule-hit.moyen     { color:#c05621; }
    .rule-hit.pasurgent { color:#276749; }
    .rule-hit.inconnu   { color:#718096; }
    .rule-hit.autre     { color:#4a5568; }
    .mail-body-box { background:#f7fafc; border-radius:8px; padding:10px 13px; font-size:0.8rem; color:#4a5568; line-height:1.65; border-left:3px solid #e2e8f0; white-space:pre-wrap; word-break:break-word; }
    .mail-body-box h4 { font-size:0.64rem; font-weight:800; text-transform:uppercase; letter-spacing:.09em; color:#a0aec0; margin-bottom:6px; }

    .card-actions { display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
    .btn-traite { background:#e2e8f0; color:#4a5568; border:none; border-radius:6px; padding:5px 12px; font-size:0.76rem; font-weight:600; cursor:pointer; }
    .btn-traite:hover { background:#cbd5e0; }
    .btn-traite.done { background:#c6f6d5; color:#276749; }
    .btn-reply { background:#2b6cb0; color:white; border:none; border-radius:6px; padding:5px 14px; font-size:0.76rem; font-weight:600; cursor:pointer; }
    .btn-reply:hover { background:#2c5282; }
    .btn-archive { background:#fff; color:#718096; border:1px solid #cbd5e0; border-radius:6px; padding:5px 14px; font-size:0.76rem; font-weight:600; cursor:pointer; }
    .btn-archive:hover { background:#edf2f7; color:#4a5568; }

    .reply-form { margin-top:10px; background:#f7fafc; border:1px solid #e2e8f0; border-radius:8px; padding:11px 12px; }
    .reply-to { font-size:0.76rem; color:#718096; margin-bottom:6px; }
    .reply-form textarea { width:100%; min-height:90px; resize:vertical; padding:8px 10px; border:1px solid #cbd5e0; border-radius:7px; font-size:0.84rem; font-family:inherit; }
    .reply-form textarea:focus { outline:none; border-color:#2b6cb0; }
    .reply-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:8px; }
    .reply-actions .btn-ghost { padding:6px 14px; font-size:0.8rem; }
    .reply-actions .btn-primary { padding:6px 16px; font-size:0.8rem; }
    .reply-actions .btn-primary:disabled { opacity:.6; cursor:wait; }

    .photos-box { margin-top:10px; background:#f7fafc; border-radius:8px; padding:10px 13px; }
    .photos-box h4 { font-size:0.64rem; font-weight:800; text-transform:uppercase; letter-spacing:.09em; color:#a0aec0; margin-bottom:8px; }
    .photos-grid { display:flex; flex-wrap:wrap; gap:8px; }
    .btn-photos { background:#2b6cb0; color:white; border:none; border-radius:6px; padding:6px 14px; font-size:0.78rem; font-weight:600; cursor:pointer; }
    .btn-photos:hover { background:#2c5282; }
    .photo-thumb { width:120px; height:120px; object-fit:cover; border-radius:8px; border:1px solid #cbd5e0; cursor:zoom-in; transition:transform .1s; }
    .photo-thumb:hover { transform:scale(1.04); border-color:#2b6cb0; }

    /* ── Visionneuse plein écran ── */
    .lightbox {
      display:none; position:fixed; inset:0; z-index:400;
      background:rgba(0,0,0,.92);
      align-items:center; justify-content:center; overflow:auto;
    }
    .lightbox.open { display:flex; }
    .lb-img {
      max-width:94vw; max-height:90vh; object-fit:contain;
      border-radius:6px; box-shadow:0 10px 40px rgba(0,0,0,.6);
      transform-origin:center center; transition:transform .15s; cursor:grab;
    }
    .lb-close {
      position:fixed; top:18px; right:22px; z-index:401;
      background:rgba(255,255,255,.15); color:white; border:none;
      width:42px; height:42px; border-radius:50%; font-size:1.2rem; cursor:pointer;
    }
    .lb-close:hover { background:rgba(255,255,255,.3); }
    .lb-tools {
      position:fixed; bottom:22px; left:50%; transform:translateX(-50%); z-index:401;
      display:flex; gap:8px; background:rgba(255,255,255,.12);
      padding:7px 12px; border-radius:30px;
    }
    .lb-tools button, .lb-tools a {
      background:rgba(255,255,255,.15); color:white; border:none; text-decoration:none;
      width:38px; height:38px; border-radius:50%; font-size:1rem; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
    }
    .lb-tools button:hover, .lb-tools a:hover { background:rgba(255,255,255,.32); }

    /* ── FAB ── */
    .fab { position:fixed; bottom:22px; right:22px; background:#2b6cb0; color:white; border:none; border-radius:50%; width:50px; height:50px; font-size:1.35rem; cursor:pointer; box-shadow:0 4px 16px rgba(43,108,176,.4); z-index:100; transition:.15s; }
    .fab:hover { background:#2c5282; transform:scale(1.05); }

    /* ── Modal ── */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:200; align-items:center; justify-content:center; }
    .modal-overlay.open { display:flex; }
    .modal { background:white; border-radius:13px; padding:23px; width:min(510px,95vw); max-height:90vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,.3); }
    .modal h2 { font-size:.98rem; margin-bottom:15px; color:#1a365d; }
    .form-group { margin-bottom:11px; }
    .form-group label { display:block; font-size:0.77rem; font-weight:600; color:#4a5568; margin-bottom:3px; }
    .form-group input,.form-group textarea,.form-group select { width:100%; padding:7px 10px; border:1px solid #e2e8f0; border-radius:7px; font-size:0.84rem; font-family:inherit; }
    .form-group textarea { min-height:82px; resize:vertical; }
    .modal-actions { display:flex; gap:9px; justify-content:flex-end; margin-top:14px; }
    .btn-ghost { background:#e2e8f0; color:#4a5568; border:none; border-radius:7px; padding:7px 16px; font-size:0.84rem; font-weight:600; cursor:pointer; }

    .toast { position:fixed; bottom:84px; right:22px; color:white; border-radius:9px; padding:9px 16px; font-size:0.81rem; max-width:300px; box-shadow:0 4px 16px rgba(0,0,0,.2); z-index:300; display:none; }
    .toast.visible { display:block; }
    .empty { text-align:center; color:#a0aec0; padding:40px; font-size:0.9rem; }
  </style>
</head>
<body>

<header>
  <span class="logo">🩺</span>
  <div>
    <h1>TriPatient</h1>
    <p>Classification des mails — Cabinet de Dermatologie</p>
  </div>
  <div class="header-right">
    <div class="clock" id="clock"></div>
    <button class="btn-refresh-hdr" onclick="syncGmail()" title="Récupérer les nouveaux mails">↻ Actualiser</button>
    <button class="btn-refresh-hdr" onclick="importerHistorique()" title="Importer les mails plus anciens">⏳ Importer l'historique</button>
    <button class="btn-refresh-hdr" id="btnIA" onclick="configurerIA()" title="Activer le tri par IA (Gemini)">🤖 IA</button>
    <button class="btn-refresh-hdr" id="btnReclasser" onclick="reclasserToutIA()" title="Repasser tous les mails dans l'IA" style="display:none">♻️ Reclasser (IA)</button>
    <button class="btn-gmail" id="btnGmail" onclick="handleGmailAuth()">
      <span class="gmail-dot" id="gmailDot"></span>
      <span id="btnGmailLabel">Connecter Gmail</span>
    </button>
  </div>
</header>

<div class="stats-bar" id="statsBar">
  <span class="stat-label">Chargement…</span>
</div>

<div class="sync-bar" id="syncBar">
  <div class="spinner"></div>
  <span id="syncMsg">Synchronisation…</span>
  <button class="btn-sm" onclick="syncGmail()">↻ Actualiser</button>
</div>

<main id="main"></main>

<div class="toast" id="toast"></div>

<!-- Visionneuse photo plein écran -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <button class="lb-close" onclick="closeLightbox(event,true)" title="Fermer">✕</button>
  <div class="lb-tools" onclick="event.stopPropagation()">
    <button onclick="lbZoom(-0.25)" title="Dézoomer">➖</button>
    <button onclick="lbZoom(0.25)" title="Zoomer">➕</button>
    <button onclick="lbZoomReset()" title="Taille réelle">⟲</button>
    <a id="lbDownload" download="photo" title="Télécharger">⬇️</a>
  </div>
  <img id="lbImg" class="lb-img" src="" alt="photo" onclick="event.stopPropagation()">
</div>
<button class="fab" onclick="openModal()">+</button>

<div class="modal-overlay" id="modalOverlay" onclick="closeModalIfOutside(event)">
  <div class="modal">
    <h2>📨 Ajouter un mail manuellement</h2>
    <div class="form-group"><label>Patient</label><select id="selectPatient"></select></div>
    <div class="form-group"><label>Sujet</label><input type="text" id="inSujet" /></div>
    <div class="form-group"><label>Contenu</label><textarea id="inCorps"></textarea></div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal()">Annuler</button>
      <button class="btn-primary" onclick="ajouterMail()">Analyser & Classer</button>
    </div>
  </div>
</div>

<!-- Google Identity Services -->
<script src="https://accounts.google.com/gsi/client" async defer></script>

<!-- Supabase JS v2 CDN (defer : ne bloque plus l'affichage initial) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js" defer></script>

<script>
// ════════════════════════════════════════════════════════════════
// CONFIG — lue depuis localStorage (saisie 1 seule fois par l'utilisateur)
// ════════════════════════════════════════════════════════════════
const SUPABASE_URL    = localStorage.getItem("tp_supabaseUrl")   || "";
const SUPABASE_KEY    = localStorage.getItem("tp_supabaseKey")   || "";
const GMAIL_CLIENT_ID = localStorage.getItem("tp_gmailClientId") || "";
const GEMINI_KEY      = localStorage.getItem("tp_geminiKey")     || "";  // optionnel : active l'IA

// ── Supabase client (créé à la demande, car la librairie est en "defer") ──
let sb = null;
function ensureSb() {
  if (!sb && typeof supabase !== "undefined" && SUPABASE_URL && SUPABASE_KEY) {
    sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  }
  return sb;
}
// Attend que la librairie Supabase (chargée en differé) soit prête
function waitForSupabase() {
  return new Promise(res => {
    if (ensureSb()) return res();
    const t = setInterval(() => { if (ensureSb()) { clearInterval(t); res(); } }, 50);
  });
}

// ════════════════════════════════════════════════════════════════
// État local (fallback si Supabase pas encore configuré)
// ════════════════════════════════════════════════════════════════
let PATIENTS = [];
let MAILS    = [];

// ════════════════════════════════════════════════════════════════
// Règles de classification
// ════════════════════════════════════════════════════════════════
// Motifs "facture / paiement" — priorité maximale, classés URGENT
const FACTURE_TESTS = [
  /\bfactures?\b/i, /\binvoice\b/i, /\bimpay[ée]e?s?\b/i,
  /relance\s+(de\s+)?paiement/i, /[ée]ch[ée]ance.{0,25}paiement/i,
  /r[èe]glement.{0,25}facture/i, /facture.{0,25}[àa]\s+r[ée]gler/i,
  /paiement.{0,25}(en\s+attente|[àa]\s+r[ée]gler|d[ûu]|dus?)/i,
  /\bavis\s+d.[ée]ch[ée]ance\b/i, /\bprélèvement\b/i,
];

const REGLES = [
  { id:"facture",          label:"Facture / paiement",                     classe:"urgent",    tests:FACTURE_TESTS },
  { id:"annulation",       label:"Annulation de rendez-vous",              classe:"urgent",    tests:[/annul/i] },
  { id:"peau-blanche-nez", label:"Peau blanche à côté du nez",            classe:"urgent",    tests:[/peau\s+blanche.{0,30}nez/i,/blanc.{0,20}nez/i] },
  { id:"boutons-persist",  label:"Bouton(s) persistant(s)",                classe:"urgent",    tests:[/boutons?\s+persist/i,/persist.{0,20}bouton/i] },
  { id:"plaie-croute",     label:"Plaie avec croûtes persistantes",        classe:"urgent",    tests:[/plaie.{0,40}cro[uû]te/i,/cro[uû]te.{0,40}persist/i] },
  { id:"kyste-grossit",    label:"Kyste qui grossit",                      classe:"urgent",    tests:[/kyste.{0,30}(grossi|augment|grand)/i] },

function estCommercial(mail) {
  const exped = ((mail.email_expediteur||"") + " " + (mail.nom_expediteur||"")).toLowerCase();
  if (EXPEDITEUR_COMMERCIAL.some(re => re.test(exped))) return true;
  if (DOMAINES_COMMERCIAL.some(re => re.test(exped))) return true;
  const txt = (mail.sujet||"") + " " + (mail.corps||"");
  if (CORPS_COMMERCIAL.some(re => re.test(txt))) return true;
  return false;
}

// Classification.  isPatient = l'expéditeur est un patient enregistré.
function classerMail(mail, isPatient=false) {
  const txt = (mail.sujet||"") + " " + (mail.corps||"");
  // 1) Factures / paiements → URGENT (priorité maximale, même pour les fournisseurs)
  if (FACTURE_TESTS.some(re => re.test(txt))) {
    return { classe:"urgent", regle_label:"Facture / paiement" };
  }
  // 2) Règles médicales (priorité sur le commercial : un vrai mail médical ne doit
  //    jamais finir en "Autre", même si l'expéditeur n'est pas un patient enregistré)
  for (const r of REGLES) {
    for (const re of r.tests) {
      if (re.test(txt)) return { classe:r.classe, regle_label:r.label };
    }
  }
  // 3) Mail d'entreprise / pub / notification non lié à un patient → "Autre"
  if (!isPatient && estCommercial(mail)) {
    return { classe:"autre", regle_label:"Mail d'entreprise / publicité" };
  }
  // 4) Aucun pattern reconnu
  if (isPatient) return { classe:"inconnu", regle_label:"Patient — cas non répertorié" };
  return { classe:"autre", regle_label:"Expéditeur inconnu / non-patient" };
}

  if (!confirm("Archiver ce mail ?\nIl sera retiré de la boîte de réception Gmail et de TriPatient.")) return;
  try {
    // 1) Archiver dans Gmail (retire l'étiquette INBOX)
    if (mail.source === "gmail" && mail.gmail_id) {
      if (!accessToken) { showToast("Connectez Gmail d'abord."); return; }
      await gmailPost(
        `https://gmail.googleapis.com/gmail/v1/users/me/messages/${mail.gmail_id}/modify`,
        { removeLabelIds: ["INBOX"] }
      );
    }
    // 2) Supprimer de Supabase
    if (sb) await sb.from("mails").delete().eq("id", mailId);
    // 3) Retirer de la liste locale

      setGmailConnected(true);

    setGmailConnected(false);

async function gmailFetch(url) {
  const r = await fetch(url, { headers:{ Authorization:"Bearer "+accessToken } });
  if (!r.ok) { const e=await r.json().catch(()=>({})); const err=new Error(e.error?.message||r.status); err.status=r.status; throw err; }

}

const sleep = (ms) => new Promise(res => setTimeout(res, ms));

// POST authentifié vers l'API Gmail
async function gmailPost(url, bodyObj) {
  const r = await fetch(url, {
    method:"POST",
    headers:{ Authorization:"Bearer "+accessToken, "Content-Type":"application/json" },
    body: JSON.stringify(bodyObj),
  });
  if (!r.ok) { const e=await r.json().catch(()=>({})); const err=new Error(e.error?.message||r.status); err.status=r.status; throw err; }
  return r.json();

// Encode un texte UTF-8 en base64 (pour sujet et corps MIME)
function b64encodeUtf8(str) {
  return btoa(unescape(encodeURIComponent(str)));
}

// Construit un message MIME (RFC 2822) de réponse, encodé en base64url pour l'API
function buildRawReply({ to, subject, body, messageId }) {
  const subjectEnc = "=?UTF-8?B?" + b64encodeUtf8(subject) + "?=";
  const bodyB64    = b64encodeUtf8(body);
  const lignes = [
    `To: ${to}`,
    `Subject: ${subjectEnc}`,
    messageId ? `In-Reply-To: ${messageId}` : "",
    messageId ? `References: ${messageId}` : "",
    "MIME-Version: 1.0",
    'Content-Type: text/plain; charset="UTF-8"',
    "Content-Transfer-Encoding: base64",
    "",
    bodyB64,
  ].filter(Boolean);
  const raw = lignes.join("\r\n");
  // base64url du message complet
  return btoa(raw).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");
}

// Envoie une réponse à un mail Gmail (dans le même fil de discussion)
async function sendReply(mailId) {
  const mail = MAILS.find(m => m.id === mailId);
  if (!mail) return;
  const zone = document.getElementById("replytext-"+mailId);
  const texte = zone ? zone.value.trim() : "";
  if (!texte) { showToast("Écrivez un message avant d'envoyer."); return; }
  if (!accessToken) { showToast("Connectez Gmail d'abord."); return; }

  const btn = document.getElementById("sendbtn-"+mailId);
  if (btn) { btn.disabled = true; btn.textContent = "Envoi…"; }

  try {
    // Récupère les métadonnées du mail original (threadId + Message-ID) pour répondre dans le fil
    const meta = await gmailFetchRetry(
      `https://gmail.googleapis.com/gmail/v1/users/me/messages/${mail.gmail_id}?format=metadata&metadataHeaders=Message-ID&metadataHeaders=Subject`
    );
    const headers   = meta.payload?.headers || [];
    const messageId = hdr(headers, "Message-ID");
    let   subject   = hdr(headers, "Subject") || mail.sujet || "";
    if (!/^re\s*:/i.test(subject)) subject = "Re: " + subject;

    const raw = buildRawReply({ to: mail.email_expediteur, subject, body: texte, messageId });
    await gmailPost("https://gmail.googleapis.com/gmail/v1/users/me/messages/send", {
      raw, threadId: meta.threadId,
    });

    showToast("Réponse envoyée ✅", 3000, "#276749");
    cancelReply(mailId);
    // Marque le mail comme traité automatiquement
    if (!mail.traite) await toggleTraite(mailId, false);
  } catch(e) {
    showToast("Erreur d'envoi : " + e.message);
    if (btn) { btn.disabled = false; btn.textContent = "Envoyer"; }
  }
}

// Réessaie automatiquement en cas de "too many requests" (429) ou erreur serveur (5xx)
async function gmailFetchRetry(url, maxRetries=5) {
  let attente = 800;
  for (let essai=0; essai<=maxRetries; essai++) {
    try {
      return await gmailFetch(url);
    } catch(e) {
      const surcharge = e.status===429 || e.status===403 || (e.status>=500 && e.status<600)
        || /rate|quota|too many/i.test(e.message||"");
      if (surcharge && essai < maxRetries) {
        setSyncBar(true, `Trop de requêtes — pause ${Math.round(attente/1000)}s puis reprise…`);
        await sleep(attente);
        attente = Math.min(attente*2, 10000); // backoff exponentiel, max 10s
        continue;
      }
      throw e;
    }
  }
}

function b64(s) {
  try { return decodeURIComponent(escape(atob(s.replace(/-/g,"+").replace(/_/g,"/")))); }
  catch { return atob(s.replace(/-/g,"+").replace(/_/g,"/")); }
}

function extractBody(payload) {
  if (!payload) return "";
  const scan = (parts) => {
    if (!parts) return null;
    for (const p of parts) {
      if (p.mimeType==="text/plain" && p.body?.data) return b64(p.body.data);
      if (p.parts) { const r=scan(p.parts); if (r) return r; }
    }
    return null;
  };
  if (payload.mimeType==="text/plain" && payload.body?.data) return b64(payload.body.data);
  return scan(payload.parts) || "";
}

function hdr(headers, name) {
  return (headers.find(h=>h.name.toLowerCase()===name.toLowerCase())||{}).value||"";
}

// Parcourt le mail et liste toutes les images jointes (photos de lésions, etc.)
function collectAttachments(payload) {
  const out = [];
  const walk = (part) => {
    if (!part) return;
    const mime = (part.mimeType||"").toLowerCase();
    if (mime.startsWith("image/") && part.body) {
      if (part.body.attachmentId) {
        out.push({ attachmentId: part.body.attachmentId, mimeType: part.mimeType, filename: part.filename||"photo" });
      } else if (part.body.data) {
        out.push({ data: part.body.data, mimeType: part.mimeType, filename: part.filename||"photo" });
      }
    }
    (part.parts||[]).forEach(walk);
  };
  walk(payload);
  return out;
}

// Charge et affiche les photos d'un mail (à la demande, quand on clique)
async function loadPhotos(mailId) {
  const mail = MAILS.find(m => m.id === mailId);
  const container = document.getElementById("photos-"+mailId);
  if (!mail || !container) return;
  container.innerHTML = `<span style="font-size:.8rem;color:#718096">Chargement des photos…</span>`;
  try {
    const blocs = [];
    for (const att of (mail.pieces_jointes||[])) {
      let b64;
      if (att.data) {
        b64 = att.data;
      } else {
        if (!accessToken) { container.innerHTML = `<span style="font-size:.8rem;color:#c53030">Connectez Gmail pour afficher les photos.</span>`; return; }
        const res = await gmailFetchRetry(
          `https://gmail.googleapis.com/gmail/v1/users/me/messages/${mail.gmail_id}/attachments/${att.attachmentId}`
        );
        b64 = res.data;
      }
      const dataUrl = `data:${att.mimeType};base64,${b64.replace(/-/g,"+").replace(/_/g,"/")}`;
      blocs.push(`<img src="${dataUrl}" class="photo-thumb" alt="${att.filename}" title="${att.filename} — cliquer pour agrandir" onclick="openLightbox(this.src)">`);
    }
    container.innerHTML = blocs.length ? blocs.join("") : `<span style="font-size:.8rem;color:#718096">Aucune image trouvée.</span>`;
  } catch(e) {
    container.innerHTML = `<span style="font-size:.8rem;color:#c53030">Erreur : ${e.message}</span>`;
  }
}

  const saisie = prompt(msg, actuelle);
  if (saisie === null) return; // annulé
  const k = saisie.trim();
  if (k) localStorage.setItem("tp_geminiKey", k);
  else   localStorage.removeItem("tp_geminiKey");
  location.reload();
}

// Classe un lot de mails via l'IA Gemini. Renvoie [{id, classe, raison}] ou lève une erreur.
async function aiClassifyBatch(items) {
  const prompt = `Tu es un assistant de tri pour un cabinet de DERMATOLOGIE. Classe chaque email dans EXACTEMENT une de ces catégories :
- "urgent" : lésion qui saigne/grossit, bouton persistant, plaie avec croûtes, annulation de rdv, suite de consultation passée, FACTURE ou paiement, peau blanche près du nez, douleur/inquiétude forte.
- "moyen" : grain de beauté nouveau ou suspect, plaque cutanée, rougeur sous l'œil, demande d'ordonnance/renouvellement, contrôle sous biothérapie.
- "pasurgent" : acné, verrues, contrôle de routine, simple demande de rendez-vous sans précision.
- "inconnu" : email d'un VRAI patient mais dont le motif n'entre dans aucune catégorie ci-dessus.
- "autre" : email NON lié à un patient (publicité, entreprise, Vinted, La Poste, newsletter, réseau social, notification automatique).

Réponds UNIQUEMENT en JSON : un tableau d'objets {"id":"...","classe":"...","raison":"courte phrase en français"}.

Emails à classer :
${JSON.stringify(items)}`;

  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY}`,
    {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        contents:[{ parts:[{ text: prompt }] }],
        generationConfig:{ responseMimeType:"application/json", temperature:0 },
      }),
    }
  );
  if (!res.ok) { const err = new Error("Gemini " + res.status); err.status = res.status; throw err; }
  const data = await res.json();
  const txt  = data.candidates?.[0]?.content?.parts?.[0]?.text || "[]";
  return JSON.parse(txt);
}

// Appel IA avec reprise automatique si Gemini est saturé (429/449/5xx)
async function aiClassifyRetry(items, maxRetries=5) {
  let attente = 4000; // 4s au départ (le gratuit accepte ~15 requêtes/min)
  for (let essai=0; essai<=maxRetries; essai++) {
    try {
      return await aiClassifyBatch(items);
    } catch(e) {
      const saturé = [429,449,500,503].includes(e.status) || /quota|rate|resource/i.test(e.message||"");
      if (saturé && essai < maxRetries) {
        setSyncBar(true, `IA saturée — pause ${Math.round(attente/1000)}s puis reprise…`);
        await sleep(attente);
        attente = Math.min(attente*2, 30000); // jusqu'à 30s
        continue;
      }
      throw e;
    }
  }
}

// Repasse TOUS les mails déjà enregistrés dans l'IA (corrige les anciens classés par règles)
async function reclasserToutIA() {
  if (!GEMINI_KEY) { showToast("Activez d'abord l'IA (bouton 🤖 IA)."); return; }
  const cibles = MAILS.filter(m => m.source === "gmail" || m.source === "manuel");
  if (!cibles.length) { showToast("Aucun mail à reclasser."); return; }
  if (!confirm(`Reclasser les ${cibles.length} mails avec l'IA ?\nCela peut prendre un moment.`)) return;

  setSyncBar(true, "Reclassement par IA…");
  let fait = 0, echecsConsecutifs = 0, saturee = false;
  for (let i = 0; i < cibles.length; i += 10) {
    if (saturee) break; // IA saturée → on s'arrête, le reste garde son classement actuel
    setSyncBar(true, `Reclassement IA ${Math.min(i+10,cibles.length)}/${cibles.length}…`);
    const lot = cibles.slice(i, i+10).map(m => ({
      id: m.id, sujet: m.sujet, corps: (m.corps||"").slice(0,600),
      expediteur: m.email_expediteur, estPatient: !!getPatientByEmail(m.email_expediteur),
    }));
    try {
      const res = await aiClassifyRetry(lot);
      for (const r of res) {
        const m = cibles.find(x => x.id === r.id);
        if (m && CLASSE_META[r.classe]) {
          m.classe = r.classe;
          m.regle_label = "IA : " + (r.raison || r.classe);
          fait++;
          if (sb) await sb.from("mails").update({ classe:m.classe, regle_label:m.regle_label }).eq("id", m.id);
        }
      }
      echecsConsecutifs = 0;
      await sleep(4500); // pause anti-saturation entre lots
    } catch(e) {
      echecsConsecutifs++;
      if (echecsConsecutifs >= 2) saturee = true;
    }
  }
  setSyncBar(false);
  render();
  if (saturee) showToast(`IA saturée — ${fait} mails reclassés, le reste garde son classement. Réessayez plus tard.`, 5000, "#c05621");
  else showToast(`${fait} mail(s) reclassés par l'IA ✅`, 3000, "#276749");
}

// Importe les mails plus anciens (au-delà de la synchro incrémentale)
async function importerHistorique() {
  if (!accessToken) { showToast("Connectez Gmail d'abord."); return; }
  const saisie = prompt("Importer les mails reçus depuis combien de jours ?\n(ex: 30 pour le dernier mois)", "30");
  if (saisie === null) return;

  await syncGmail(`in:inbox newer_than:${jours}d`);
}

let syncEnCours = false;  // verrou : empêche deux synchros simultanées (anti-doublon)

async function syncGmail(forceQuery=null) {
  if (!accessToken) return;
  if (syncEnCours) { showToast("Une synchronisation est déjà en cours…", 2500, "#c05621"); return; }
  syncEnCours = true;
  setSyncBar(true, forceQuery ? "Import de l'historique…" : "Recherche des nouveaux mails…");
  try {
    // Ids des mails Gmail déjà connus (en mémoire / Supabase) pour éviter les doublons
    const existingIds = new Set(
      MAILS.filter(m => m.source==="gmail" && m.gmail_id).map(m => m.gmail_id)
    );
    const gmailMails = MAILS.filter(m => m.source==="gmail" && m.date_reception);

    // Sync incrémentale : on ne demande QUE les mails arrivés après le plus récent déjà connu.
    // forceQuery permet d'importer une fenêtre plus large (ex: historique sur 30 jours).
    let q;
    if (forceQuery) {
      q = forceQuery;
    } else if (gmailMails.length) {
      const plusRecent = Math.max(...gmailMails.map(m => new Date(m.date_reception).getTime()));
      const epoch = Math.floor(plusRecent / 1000); // secondes
      q = `in:inbox after:${epoch}`;
    } else {
      q = `in:inbox newer_than:2d`;
    }

    // Pagination : on récupère TOUTES les pages, donc aucun plafond.
    // (sécurité : on s'arrête à 1000 mails pour éviter un cas extrême)
    let tousLesMsg = [];
    let pageToken = null;
    const PLAFOND_SECURITE = 1000;
    do {
      const url = `https://gmail.googleapis.com/gmail/v1/users/me/messages?maxResults=100&q=${encodeURIComponent(q)}`
        + (pageToken ? `&pageToken=${pageToken}` : "");
      const page = await gmailFetchRetry(url);
      if (page.messages) tousLesMsg.push(...page.messages);
      pageToken = page.nextPageToken;
      if (tousLesMsg.length >= PLAFOND_SECURITE) break;
      if (pageToken) setSyncBar(true, `Recherche… ${tousLesMsg.length} mails trouvés`);
    } while (pageToken);

    // On retire ceux déjà présents (le mail le plus récent est souvent re-renvoyé par "after:")
    const aRecuperer = tousLesMsg.filter(m => !existingIds.has(m.id));

    if (!aRecuperer.length) {
      setSyncBar(false);
      showToast("Aucun nouveau mail.",3000,"#276749");
      render(); return;
    }

    // Chargement séquentiel (un par un) pour éviter le "too many requests"
    const details = [];
    for (let i = 0; i < aRecuperer.length; i++) {
      const m = aRecuperer[i];
      setSyncBar(true, `Nouveau mail ${i+1}/${aRecuperer.length}…`);
      const msg = await gmailFetchRetry(
        `https://gmail.googleapis.com/gmail/v1/users/me/messages/${m.id}?format=full`
      );
      details.push(msg);
      await sleep(120); // petite pause entre chaque requête
    }

    const nouveaux = [];
    for (const msg of details) {
      const headers = msg.payload?.headers||[];
      const from    = hdr(headers,"From");
      const emailMatch = from.match(/<(.+?)>/) || from.match(/(\S+@\S+)/);
      const emailExp   = emailMatch ? emailMatch[1].toLowerCase() : from.trim().toLowerCase();
      const sujet   = hdr(headers,"Subject")||"(sans objet)";
      const date    = hdr(headers,"Date");
      const corps   = extractBody(msg.payload).substring(0,2000);
      const nomExp  = from.replace(/<.+>/,"").trim().replace(/"/g,"")||emailExp;
      const photos  = collectAttachments(msg.payload);
      const estPatient = !!getPatientByEmail(emailExp);
      const { classe, regle_label } = classerMail(
        { sujet, corps, email_expediteur:emailExp, nom_expediteur:nomExp },
        estPatient
      );

      const mail = {
        id:               "G"+msg.id,
        email_expediteur:  emailExp,
        nom_expediteur:    nomExp,
        date_reception:    date ? new Date(date).toISOString() : new Date().toISOString(),
        sujet, corps, classe, regle_label,
        source:"gmail", gmail_id:msg.id, traite:false,
        pieces_jointes:   photos,
      };
      MAILS.unshift(mail);
      nouveaux.push(mail);
    }

    // Affinage par IA (si une clé Gemini est configurée) — par lots de 10.
    // RÈGLE DE REPLI : si un lot sature, ces mails GARDENT leur classement par mots-clés.
    // Si l'IA sature 2 fois de suite, on arrête l'IA et les mots-clés finissent le travail.
    if (GEMINI_KEY && nouveaux.length) {
      let echecsConsecutifs = 0;
      let iaAbandonnee = false;
      for (let i = 0; i < nouveaux.length; i += 10) {
        if (iaAbandonnee) break; // les mails restants gardent déjà leur classement par règles
        setSyncBar(true, `Analyse IA ${Math.min(i+10,nouveaux.length)}/${nouveaux.length}…`);
        const lot = nouveaux.slice(i, i+10).map(m => ({
          id: m.id, sujet: m.sujet, corps: (m.corps||"").slice(0,600),
          expediteur: m.email_expediteur, estPatient: !!getPatientByEmail(m.email_expediteur),
        }));
        try {
          const res = await aiClassifyRetry(lot);
          res.forEach(r => {
            const m = nouveaux.find(x => x.id === r.id);
            if (m && CLASSE_META[r.classe]) {
              m.classe = r.classe;
              m.regle_label = "IA : " + (r.raison || r.classe);
            }
          });
          echecsConsecutifs = 0;            // ce lot a réussi
          await sleep(4500);                // pause anti-saturation entre lots
        } catch(e) {
          // IA saturée pour ce lot → ces mails restent classés par mots-clés (déjà fait en base)
          echecsConsecutifs++;
          if (echecsConsecutifs >= 2) {
            iaAbandonnee = true;
            showToast("IA saturée — tri par mots-clés pris le relais.", 4500, "#c05621");
          }
        }
      }
    }

    // Sauvegarder dans Supabase (on ne stocke que les métadonnées des photos, pas les octets)
    if (sb && nouveaux.length) {
      await sb.from("mails").upsert(nouveaux.map(m => ({
        ...m,
        pieces_jointes: (m.pieces_jointes||[])
          .filter(a => a.attachmentId)
          .map(a => ({ attachmentId:a.attachmentId, mimeType:a.mimeType, filename:a.filename })),
        patient_id: getPatientByEmail(m.email_expediteur)?.id || null,
      })));
    }

    setSyncBar(false);
    render();
    showToast(`${details.length} nouveau${details.length>1?"x":""} mail${details.length>1?"s":""} ajouté${details.length>1?"s":""}`,3000,"#276749");
  } catch(err) {
    setSyncBar(false);
    if (err.message.includes("401")) {
      accessToken=null; setGmailConnected(false);
      showToast("Session expirée, veuillez vous reconnecter.");
    } else { showToast("Erreur Gmail : "+err.message); }
  } finally {
    syncEnCours = false;  // on libère toujours le verrou
  }
}

function fmtDate(iso) {
  try { return new Date(iso).toLocaleString("fr-FR",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"}); }
  catch { return iso; }
}

// Échappe le HTML — empêche le contenu des mails (newsletters HTML, etc.) de casser la mise en page
function esc(s) {
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}

function classerTous() {
  const pMap = Object.fromEntries(PATIENTS.map(p => [p.email?.toLowerCase(), p]));
  return MAILS.map(m => {
    const patient = pMap[m.email_expediteur?.toLowerCase()] || null;
    // Les mails classés par l'IA gardent leur décision (préfixe "IA :").
    // Les autres sont reclassés par règles à l'affichage (pour suivre toute évolution des règles).
    let classe, regle_label;
    if (m.classe && typeof m.regle_label === "string" && m.regle_label.startsWith("IA")) {
      classe = m.classe; regle_label = m.regle_label;
    } else {
      ({ classe, regle_label } = classerMail(m, !!patient));
    }
    return { mail:m, patient, classe, regle_label };
  });
}

      </div>

      <div class="detail-sep"></div>

        <div class="detail-box">

            ${patient.prochain_rdv?`<p style="margin-top:4px"><strong>Prochain RDV :</strong> ${esc(patient.prochain_rdv)}</p>`:""}

function render() {
  const tous = classerTous();
  const stats = { urgent:0,moyen:0,pasurgent:0,inconnu:0,autre:0 };
  tous.forEach(t => stats[t.classe]++);

  document.getElementById("statsBar").innerHTML = `
    <span class="stat-chip urgent">🔴 Urgent : ${stats.urgent}</span>
    <span class="stat-chip moyen">🟠 Moyen urgent : ${stats.moyen}</span>
    <span class="stat-chip pasurgent">🟢 Pas urgent : ${stats.pasurgent}</span>
    <span class="stat-chip inconnu">⚪ ? : ${stats.inconnu}</span>
    <span class="stat-chip autre">📦 Autre : ${stats.autre}</span>
    <span class="stat-label">${tous.length} message${tous.length>1?"s":""}</span>
    <button class="icon-btn" onclick="toggleLegend()">📋 Règles</button>
  `;

  const groupes = { urgent:[],moyen:[],pasurgent:[],inconnu:[],autre:[] };
  tous.forEach(item => groupes[item.classe].push(item));

  let idx=0, html="";
  for (const cls of ORDRE) {
    if (!groupes[cls].length) continue;
    html += `<div class="section-title">${CLASSE_META[cls].sectionLabel}</div>`;
    for (const item of groupes[cls]) html += renderCard(item, idx++);
  }
  if (!html) html = `<div class="empty">Aucun mail à traiter.</div>`;

  const lp = document.getElementById("legendPanel") || buildLegend();
  document.getElementById("main").innerHTML = html;
  document.getElementById("main").prepend(lp);

  cacheMails();  // garde le cache local synchronisé avec l'affichage
}

function buildLegend() {
  const div = document.createElement("div");
  div.className="legend-panel"; div.id="legendPanel";
  div.innerHTML = `<table>${REGLES.map(r=>`<tr><td>${r.label}</td><td><span class="rule-hit ${r.classe}">${CLASSE_META[r.classe].label}</span></td></tr>`).join("")}</table>`;
  return div;
}
function toggleLegend() { document.getElementById("legendPanel")?.classList.toggle("open"); }

    const o = document.createElement("option");
    o.value = p.email; o.textContent = `${p.prenom} ${p.nom} (${p.id})`;
    sel.appendChild(o);
  });
}
function openModal()  { populateSelect(); document.getElementById("modalOverlay").classList.add("open"); }
function closeModal() { document.getElementById("modalOverlay").classList.remove("open"); }
function closeModalIfOutside(e) { if (e.target===document.getElementById("modalOverlay")) closeModal(); }

async function ajouterMail() {
  const email = document.getElementById("selectPatient").value;
  const sujet = document.getElementById("inSujet").value.trim();
  const corps = document.getElementById("inCorps").value.trim();
  if (!email||!sujet||!corps) { alert("Remplissez tous les champs."); return; }
  // Ajout manuel = toujours un patient sélectionné dans la liste
  const { classe, regle_label } = classerMail({ sujet, corps, email_expediteur:email }, true);
  const mail = {
    id: "M"+Date.now(), email_expediteur:email,
    date_reception: new Date().toISOString(),
    sujet, corps, classe, regle_label, source:"manuel", traite:false,
  };
  await saveMail(mail);
  document.getElementById("inSujet").value="";
  document.getElementById("inCorps").value="";
  closeModal(); render();
}

function showToast(msg, delay=4000, bg="#c53030") {
  const t = document.getElementById("toast");
  t.textContent=msg; t.style.background=bg; t.className="toast visible";
  setTimeout(()=>t.className="toast", delay);
}

function updateClock() {
  const n = new Date();
  document.getElementById("clock").textContent =
    n.toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short"})+"  ·  "+n.toLocaleTimeString("fr-FR");
}
updateClock(); setInterval(updateClock, 1000);
